<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #f5e3cc;
  --surface: #fdf6ee;
  --surface2: #faebd7;
  --border:  #d9bf9a;
  --text:    #1c1410;
  --muted:   #8a6e5c;
  --accent:  #ca6549;
  --alight:  rgba(202,101,73,0.1);
  --sidebar: 220px;
  --mini-h:  80px;
}
html, body, #root { height: 100%; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; overflow:hidden; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
input[type=range] {
  -webkit-appearance:none; appearance:none;
  height:3px; border-radius:4px; background:rgba(0,0,0,0.12);
  outline:none; cursor:pointer; width:100%; display:block; margin:0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:13px; height:13px; border-radius:50%;
  background:var(--accent); cursor:pointer; transition:transform .15s; margin-top:-5px;
}
input[type=range]::-moz-range-thumb { width:13px; height:13px; border-radius:50%; background:var(--accent); border:none; }
textarea { font-family:'DM Sans',sans-serif; resize:none; outline:none; }
button { font-family:'DM Sans',sans-serif; }
@keyframes spin    { to { transform:rotate(360deg); } }
@keyframes pulse   { 0%,100%{opacity:.4}50%{opacity:1} }
@keyframes waveBar { 0%,100%{transform:scaleY(.2)}50%{transform:scaleY(1)} }
@keyframes fadeUp  { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
@keyframes slideUp { from{transform:translateY(100%)}to{transform:translateY(0)} }
@keyframes modalIn { from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)} }
.fade-up  { animation:fadeUp .4s cubic-bezier(.22,.68,0,1.2) both; }
.slide-up { animation:slideUp .35s cubic-bezier(.32,.72,0,1) both; }
.serif    { font-family:'DM Serif Display',Georgia,serif; }
.mono     { font-family:'DM Mono','Fira Code',monospace; }
.chip {
  padding:9px 20px; border-radius:99px;
  border:1px solid var(--border); background:var(--surface);
  font-size:13px; color:var(--text); cursor:pointer;
  transition:all .15s; white-space:nowrap; line-height:1;
}
.chip:hover { border-color:var(--accent); background:var(--alight); color:var(--accent); }
.section-label {
  font-family:'DM Mono',monospace; font-size:11px; font-weight:500;
  letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:12px;
}
.sb-item {
  display:flex; align-items:center; gap:11px; padding:10px 16px; border-radius:9px;
  cursor:pointer; font-size:14px; color:var(--muted); transition:all .15s;
  border:none; background:none; width:100%; text-align:left; position:relative;
}
.sb-item:hover { background:var(--surface2); color:var(--text); }
.sb-item.active { background:var(--alight); color:var(--accent); font-weight:500; }
.sb-item.active::before {
  content:''; position:absolute; left:0; top:25%; bottom:25%;
  width:3px; background:var(--accent); border-radius:0 2px 2px 0;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = 'http://localhost:3001';
let authToken = localStorage.getItem('authToken');
let currentUser = null;

const IconMic   = ({s=18,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/></svg>;
const IconPlay  = ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>;
const IconPause = ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>;
const IconExplore = ({s=17}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>;
const IconLibrary = ({s=17}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M9 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h4M9 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H9M9 3v18"/></svg>;
const IconProfile = ({s=17}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>;
const IconLogout = ({s=17}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 3l7 7-7 7M13 10h8"/></svg>;

const fmt = (s) => {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
};

const PALETTE = [
  'oklch(72% 0.13 200)','oklch(55% 0.15 280)','oklch(65% 0.15 140)',
  'oklch(68% 0.14 55)', 'oklch(62% 0.15 15)', 'oklch(70% 0.13 330)',
];

const seedFrom = (s) => {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return Math.abs(h);
};

function AlbumArt({ color, size=200 }) {
  return (
    <div style={{ width:size, height:size, borderRadius:Math.round(size*.09), background:color, flexShrink:0,
      display:'flex', alignItems:'center', justifyContent:'center',
      boxShadow:`0 12px 40px rgba(0,0,0,0.18)` }}>
      <svg width={size*.36} height={size*.36} viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" fill="white" fillOpacity=".18"/>
        <circle cx="20" cy="20" r="7"  fill="white" fillOpacity=".55"/>
        <circle cx="20" cy="20" r="2.5" fill="white"/>
        <path d="M20 2 A18 18 0 0 1 38 20" stroke="white" strokeOpacity=".35" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      </svg>
    </div>
  );
}

function WaveBars({ color='var(--accent)', n=8, h=22 }) {
  const amps = [.45,.75,1,.6,.88,.52,.92,.42];
  return (
    <div style={{ display:'flex', gap:3, alignItems:'flex-end', height:h, flexShrink:0 }}>
      {Array.from({length:n},(_,i)=>(
        <div key={i} style={{ width:3, height:h*amps[i%8], borderRadius:2, background:color, opacity:.82,
          animation:`waveBar ${.62+i*.07}s ease-in-out infinite`, animationDelay:`${i*.06}s` }}/>
      ))}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// LOGIN / REGISTER
// ════════════════════════════════════════════════════════════════
function AuthScreen({ onAuthSuccess }) {
  const [isLogin, setIsLogin] = useState(true);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);

    try {
      const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
      const res = await fetch(`${API}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Authentication failed');
      }

      const data = await res.json();
      localStorage.setItem('authToken', data.token);
      authToken = data.token;
      currentUser = data.user;
      onAuthSuccess();
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{
      position:'fixed', inset:0, background:'var(--bg)', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:20
    }}>
      <div style={{ textAlign:'center', marginBottom:20 }}>
        <div style={{ width:60, height:60, borderRadius:16, background:'var(--text)', margin:'0 auto 16px',
          display:'flex', alignItems:'center', justifyContent:'center' }}>
          <IconMic s={32} c='var(--bg)'/>
        </div>
        <h1 className="serif" style={{ fontSize:32, marginBottom:8 }}>Audia</h1>
        <p style={{ fontSize:14, color:'var(--muted)' }}>Create AI podcasts from text</p>
      </div>

      <form onSubmit={handleSubmit} style={{ width:380, maxWidth:'90vw', display:'flex', flexDirection:'column', gap:12 }}>
        <input
          type="email"
          placeholder="Email"
          value={email}
          onChange={e => setEmail(e.target.value)}
          style={{
            padding:'11px 14px', border:'1px solid var(--border)', borderRadius:9,
            background:'var(--surface)', fontSize:14, outline:'none'
          }}
          required
        />
        <input
          type="password"
          placeholder="Password"
          value={password}
          onChange={e => setPassword(e.target.value)}
          style={{
            padding:'11px 14px', border:'1px solid var(--border)', borderRadius:9,
            background:'var(--surface)', fontSize:14, outline:'none'
          }}
          required
        />

        {error && <div style={{ color:'#d32f2f', fontSize:13 }}>{error}</div>}

        <button
          type="submit"
          disabled={loading}
          style={{
            padding:'11px', background:'var(--accent)', color:'white', border:'none',
            borderRadius:9, fontSize:14, fontWeight:500, cursor:'pointer', opacity:loading?0.6:1
          }}
        >
          {loading ? 'Loading...' : (isLogin ? 'Sign In' : 'Sign Up')}
        </button>
      </form>

      <button
        onClick={() => setIsLogin(!isLogin)}
        style={{
          background:'none', border:'none', color:'var(--accent)', cursor:'pointer', fontSize:13
        }}
      >
        {isLogin ? "Don't have an account? Sign up" : 'Already have an account? Sign in'}
      </button>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// BILLING MODAL
// ════════════════════════════════════════════════════════════════
function BillingModal({ user, onClose }) {
  const [loading, setLoading] = useState(false);

  const handleUpgrade = async (plan) => {
    setLoading(true);
    try {
      const res = await fetch(`${API}/api/billing/checkout`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify({ plan })
      });

      if (!res.ok) throw new Error('Checkout failed');

      const data = await res.json();
      if (data.checkoutUrl) window.location.href = data.checkoutUrl;
    } catch (err) {
      alert('Error: ' + err.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{
      position:'fixed', inset:0, zIndex:1000, background:'rgba(28,20,16,0.45)', backdropFilter:'blur(4px)',
      display:'flex', alignItems:'center', justifyContent:'center'
    }} onClick={onClose}>
      <div style={{
        background:'var(--surface)', borderRadius:20, padding:'36px 32px', width:500, maxWidth:'90vw',
        boxShadow:'0 24px 80px rgba(28,20,16,0.22)', animation:'modalIn .25s cubic-bezier(.22,.68,0,1.2) both'
      }} onClick={e => e.stopPropagation()}>
        <button onClick={onClose} style={{
          position:'absolute', top:16, right:16, width:32, height:32, borderRadius:'50%',
          border:'none', background:'rgba(0,0,0,0.06)', cursor:'pointer', color:'var(--muted)',
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:16
        }}>×</button>

        <h2 className="serif" style={{ fontSize:26, marginBottom:8 }}>Upgrade to Pro</h2>
        <p style={{ fontSize:14, color:'var(--muted)', marginBottom:24 }}>
          {user.plan === 'free' ? 'You've reached your monthly limit. Upgrade for unlimited episodes.' : 'Change your plan.'}
        </p>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:24 }}>
          {[
            { plan:'pro', name:'Pro', price:'$9.99/mo', features:['50 episodes/month', '30 min each', 'Premium voices'] },
            { plan:'business', name:'Business', price:'$29.99/mo', features:['Unlimited episodes', 'Unlimited duration', 'All features + analytics'] }
          ].map(({plan, name, price, features}) => (
            <div key={plan} style={{
              border:'1px solid var(--border)', borderRadius:12, padding:16, textAlign:'center'
            }}>
              <div style={{ fontSize:16, fontWeight:600, marginBottom:4 }}>{name}</div>
              <div style={{ fontSize:20, fontWeight:700, color:'var(--accent)', marginBottom:16 }}>{price}</div>
              {features.map((f, i) => (
                <div key={i} style={{ fontSize:12, color:'var(--muted)', marginBottom:8 }}>✓ {f}</div>
              ))}
              <button
                onClick={() => handleUpgrade(plan)}
                disabled={loading || user.plan !== 'free'}
                style={{
                  width:'100%', padding:'9px', background:'var(--accent)', color:'white', border:'none',
                  borderRadius:8, fontSize:13, fontWeight:500, cursor:'pointer', marginTop:12,
                  opacity: loading || user.plan !== 'free' ? 0.5 : 1
                }}
              >
                {user.plan === plan ? 'Current Plan' : 'Upgrade'}
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// EXPLORE (Generate)
// ════════════════════════════════════════════════════════════════
function ExploreView({ user, onEpisodeCreated }) {
  const [topic, setTopic] = useState('');
  const [generating, setGenerating] = useState(false);
  const [progress, setProgress] = useState(null);
  const [currentEpisode, setCurrentEpisode] = useState(null);
  const [showBilling, setShowBilling] = useState(false);

  const handleGenerate = async (e) => {
    e.preventDefault();
    if (!topic.trim()) return;

    if (user.plan === 'free' && user.episodes_this_month >= 3) {
      setShowBilling(true);
      return;
    }

    setGenerating(true);
    setProgress({ step:'start', message:'Starting...' });

    try {
      const res = await fetch(`${API}/api/generate`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify({ topic })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Generation failed');
      }

      const { episodeId } = await res.json();

      // Stream progress
      const sse = new EventSource(`${API}/api/progress/${episodeId}`);
      sse.onmessage = (e) => {
        const data = JSON.parse(e.data);
        setProgress(data);

        if (data.step === 'done') {
          sse.close();
          setCurrentEpisode(data.episode);
          setTopic('');
          onEpisodeCreated();
        }
      };

      sse.onerror = () => {
        sse.close();
        setProgress({ step:'error', message:'Connection lost' });
        setGenerating(false);
      };
    } catch (err) {
      setProgress({ step:'error', message:err.message });
      setGenerating(false);
    }
  };

  if (progress?.step === 'done' || currentEpisode) {
    return <PlayerView episode={currentEpisode || progress.episode} user={user} />;
  }

  return (
    <div style={{ padding:'40px', display:'flex', flexDirection:'column', gap:20, height:'100%', overflow:'auto' }}>
      <div>
        <h1 className="serif" style={{ fontSize:32, marginBottom:8 }}>Create a Podcast</h1>
        <p style={{ color:'var(--muted)' }}>Describe your topic and Audia will generate a full episode.</p>
      </div>

      <form onSubmit={handleGenerate} style={{ display:'flex', flexDirection:'column', gap:12, maxWidth:600 }}>
        <textarea
          placeholder="What would you like your podcast about? (e.g., 'The history of coffee')"
          value={topic}
          onChange={e => setTopic(e.target.value)}
          disabled={generating}
          style={{
            padding:'14px', border:'1px solid var(--border)', borderRadius:9, background:'var(--surface)',
            fontSize:14, outline:'none', resize:'vertical', minHeight:100, fontFamily:'DM Sans'
          }}
          required
        />

        {user.plan === 'free' && (
          <div style={{ fontSize:12, color:'var(--muted)' }}>
            Episodes created: {user.episodes_this_month || 0} / 3
          </div>
        )}

        <button
          type="submit"
          disabled={generating || !topic.trim()}
          style={{
            padding:'11px 20px', background:'var(--accent)', color:'white', border:'none',
            borderRadius:9, fontSize:14, fontWeight:500, cursor:'pointer', width:140,
            opacity:generating || !topic.trim()?0.5:1
          }}
        >
          {generating ? 'Generating...' : 'Generate'}
        </button>
      </form>

      {progress && progress.step !== 'done' && (
        <div style={{ padding:20, background:'var(--surface)', borderRadius:12, maxWidth:600 }}>
          <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12 }}>
            <WaveBars n={4} h={16}/>
            <span style={{ fontSize:14 }}>{progress.message}</span>
          </div>
          {progress.voiceTotal && (
            <div style={{
              height:4, background:'rgba(0,0,0,0.1)', borderRadius:2, overflow:'hidden'
            }}>
              <div style={{
                height:'100%', background:'var(--accent)',
                width:`${(progress.voiceDone/progress.voiceTotal)*100}%`, transition:'width .2s'
              }}/>
            </div>
          )}
        </div>
      )}

      {showBilling && <BillingModal user={user} onClose={() => setShowBilling(false)} />}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// PLAYER
// ════════════════════════════════════════════════════════════════
function PlayerView({ episode, user }) {
  const audioRef = useRef(null);
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [duration, setDuration] = useState(0);

  useEffect(() => {
    if (audioRef.current && episode.audioUrl) {
      audioRef.current.src = episode.audioUrl;
      audioRef.current.load();
    }
  }, [episode]);

  return (
    <div style={{
      padding:'40px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      height:'100%', textAlign:'center'
    }}>
      <AlbumArt color={PALETTE[seedFrom(episode.topic) % PALETTE.length]} size={240}/>

      <h2 className="serif" style={{ fontSize:28, margin:'24px 0 8px' }}>
        {episode.topic}
      </h2>

      <div style={{ color:'var(--muted)', marginBottom:32 }}>
        {fmt(duration)} • {new Date(episode.createdAt).toLocaleDateString()}
      </div>

      <audio
        ref={audioRef}
        onLoadedMetadata={() => setDuration(audioRef.current.duration)}
        onTimeUpdate={() => setProgress(audioRef.current.currentTime)}
        onEnded={() => setPlaying(false)}
      />

      <div style={{ display:'flex', gap:16, alignItems:'center', marginBottom:32 }}>
        <button
          onClick={() => playing ? audioRef.current.pause() : audioRef.current.play()}
          onPlayCapture={() => setPlaying(true)}
          onPauseCapture={() => setPlaying(false)}
          style={{
            width:64, height:64, borderRadius:'50%', display:'flex', alignItems:'center',
            justifyContent:'center', border:'none', background:'var(--accent)', color:'white',
            cursor:'pointer', boxShadow:'0 4px 14px rgba(202,101,73,0.4)'
          }}
        >
          {playing ? <IconPause s={28}/> : <IconPlay s={28}/>}
        </button>
      </div>

      <div style={{ width:'100%', maxWidth:600, marginBottom:32 }}>
        <input
          type="range"
          min={0}
          max={duration}
          value={progress}
          onChange={e => {
            audioRef.current.currentTime = Number(e.target.value);
            setProgress(Number(e.target.value));
          }}
          style={{ width:'100%' }}
        />
        <div className="mono" style={{
          display:'flex', justifyContent:'space-between', fontSize:11, color:'var(--muted)',
          marginTop:6
        }}>
          <span>{fmt(progress)}</span>
          <span>-{fmt(duration - progress)}</span>
        </div>
      </div>

      <div style={{ maxWidth:600, textAlign:'left' }}>
        <div className="section-label">Script</div>
        <div style={{ background:'var(--surface)', padding:16, borderRadius:9, fontSize:13,
          lineHeight:1.6, color:'var(--muted)', maxHeight:200, overflow:'auto', whiteSpace:'pre-wrap', fontFamily:'DM Mono' }}>
          {episode.script?.substring(0, 500)}...
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// LIBRARY
// ════════════════════════════════════════════════════════════════
function LibraryView({ user, refresh }) {
  const [episodes, setEpisodes] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetchEpisodes();
  }, [refresh]);

  const fetchEpisodes = async () => {
    try {
      const res = await fetch(`${API}/api/episodes`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });

      if (!res.ok) throw new Error('Failed to load episodes');
      const data = await res.json();
      setEpisodes(data || []);
    } catch (err) {
      console.error(err);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ padding:'40px', overflow:'auto', height:'100%' }}>
      <h1 className="serif" style={{ fontSize:28, marginBottom:24 }}>Your Library</h1>

      {loading ? (
        <div style={{ textAlign:'center', color:'var(--muted)' }}>Loading...</div>
      ) : episodes.length === 0 ? (
        <div style={{ textAlign:'center', color:'var(--muted)' }}>
          No episodes yet. Create your first one in Explore.
        </div>
      ) : (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:16 }}>
          {episodes.map(ep => (
            <div key={ep.id} style={{
              background:'var(--surface)', borderRadius:12, padding:16, cursor:'pointer',
              transition:'all .15s', border:'1px solid var(--border)'
            }} onMouseEnter={e => e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)'}
               onMouseLeave={e => e.currentTarget.style.boxShadow='none'}>
              <div style={{ width:'100%', height:140, background:PALETTE[seedFrom(ep.topic)%PALETTE.length],
                borderRadius:8, marginBottom:12 }}/>
              <div style={{ fontSize:14, fontWeight:500, marginBottom:4 }}>{ep.topic?.substring(0,50)}</div>
              <div style={{ fontSize:12, color:'var(--muted)' }}>
                {ep.duration_seconds ? fmt(ep.duration_seconds) : 'Computing...'}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// PROFILE
// ════════════════════════════════════════════════════════════════
function ProfileView({ user, onLogout }) {
  return (
    <div style={{ padding:'40px', display:'flex', flexDirection:'column', gap:20 }}>
      <h1 className="serif" style={{ fontSize:28 }}>Profile</h1>

      <div style={{ background:'var(--surface)', borderRadius:12, padding:20 }}>
        <div style={{ marginBottom:16 }}>
          <div className="section-label">Email</div>
          <div style={{ fontSize:14 }}>{user.email}</div>
        </div>

        <div style={{ marginBottom:16 }}>
          <div className="section-label">Plan</div>
          <div style={{ fontSize:14, textTransform:'capitalize' }}>{user.plan}</div>
        </div>

        {user.plan === 'free' && (
          <div style={{ marginBottom:16 }}>
            <div className="section-label">Usage</div>
            <div style={{ fontSize:14 }}>{user.episodes_this_month || 0} / 3 episodes this month</div>
          </div>
        )}

        <div style={{ marginBottom:16 }}>
          <div className="section-label">Member Since</div>
          <div style={{ fontSize:14 }}>{new Date(user.created_at).toLocaleDateString()}</div>
        </div>

        <button
          onClick={onLogout}
          style={{
            display:'flex', alignItems:'center', gap:8, marginTop:20,
            background:'none', border:'none', color:'#d32f2f', cursor:'pointer', fontSize:14
          }}
        >
          <IconLogout s={16}/> Sign out
        </button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(null);
  const [view, setView] = useState('explore');
  const [refresh, setRefresh] = useState(0);

  useEffect(() => {
    if (authToken) {
      fetchUser();
    }
  }, []);

  const fetchUser = async () => {
    try {
      const res = await fetch(`${API}/api/auth/me`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });

      if (!res.ok) {
        localStorage.removeItem('authToken');
        authToken = null;
        return;
      }

      const data = await res.json();
      setUser(data);
      currentUser = data;
    } catch (err) {
      localStorage.removeItem('authToken');
      authToken = null;
    }
  };

  const handleLogout = () => {
    localStorage.removeItem('authToken');
    authToken = null;
    setUser(null);
    setView('explore');
  };

  if (!user) {
    return <AuthScreen onAuthSuccess={fetchUser} />;
  }

  return (
    <div style={{ display:'flex', height:'100%' }}>
      {/* Sidebar */}
      <div style={{
        width:'var(--sidebar)', background:'var(--surface)', borderRight:'1px solid var(--border)',
        display:'flex', flexDirection:'column', padding:12, overflow:'auto'
      }}>
        <div style={{ display:'flex', alignItems:'center', gap:9, padding:'6px 4px 20px' }}>
          <div style={{
            width:32, height:32, borderRadius:9, background:'var(--text)',
            display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0
          }}>
            <IconMic s={16} c='var(--bg)'/>
          </div>
          <div>
            <div className="serif" style={{ fontSize:17, lineHeight:1.1 }}>Audia</div>
            <div className="mono" style={{ fontSize:9, color:'var(--muted)', letterSpacing:'.06em' }}>AI PODCAST</div>
          </div>
        </div>

        <nav style={{ display:'flex', flexDirection:'column', gap:2, flex:1 }}>
          {[
            { id:'explore', label:'Explore', icon:IconExplore },
            { id:'library', label:'Library', icon:IconLibrary },
            { id:'profile', label:'Profile', icon:IconProfile }
          ].map(({ id, label, icon:Icon }) => (
            <button
              key={id}
              onClick={() => setView(id)}
              className={`sb-item${view === id ? ' active' : ''}`}
            >
              <Icon s={17}/>
              <span style={{ flex:1 }}>{label}</span>
            </button>
          ))}
        </nav>

        <div style={{ paddingTop:12, borderTop:'1px solid var(--border)' }}>
          <button
            onClick={handleLogout}
            className="sb-item"
            style={{ color:'#d32f2f' }}
          >
            <IconLogout s={17}/>
            <span>Sign out</span>
          </button>
        </div>
      </div>

      {/* Main content */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', background:'var(--bg)' }}>
        {view === 'explore' && (
          <ExploreView user={user} onEpisodeCreated={() => setRefresh(r => r + 1)}/>
        )}
        {view === 'library' && (
          <LibraryView user={user} refresh={refresh}/>
        )}
        {view === 'profile' && (
          <ProfileView user={user} onLogout={handleLogout}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
